services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - nm
    ports:
      - '5432:5432'
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: 'json-file'
      options:
        max-size: '2m'
        max-file: '3'

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:latest-alpine
    container_name: lavalink
    restart: unless-stopped
    environment:
      - _JAVA_OPTIONS=-Xmx2G
    volumes:
      - ./data/lavalink/application.yml:/opt/Lavalink/application.yml
      - ./data/lavalink/plugins/:/opt/Lavalink/plugins/
      - /run/udev:/run/udev:ro
    networks:
      - nm
    ports:
      - '2333:2333'
    healthcheck:
      test: nc -z -v localhost 2333
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - ejs-api
    logging:
      driver: 'json-file'
      options:
        max-size: '2m'
        max-file: '3'

  ejs-api:
    image: ghcr.io/kikkia/yt-cipher:master
    container_name: ejs_signature_api
    restart: unless-stopped
    init: true
    stop_grace_period: 2s
    networks:
      - nm
    ports:
      - '8001:8001'
    logging:
      driver: 'json-file'
      options:
        max-size: '2m'
        max-file: '3'

  nm:
    build:
      context: .
      cache_from:
        - ghcr.io/ny0510/nm:latest
    image: ghcr.io/ny0510/nm:latest
    container_name: nm
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    networks:
      - nm
    depends_on:
      postgres:
        condition: service_healthy
      lavalink:
        condition: service_healthy
    volumes:
      - ./data/shoukaku:/app/shoukaku
    logging:
      driver: 'json-file'
      options:
        max-size: '2m'
        max-file: '3'

networks:
  nm:
